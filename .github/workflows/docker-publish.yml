name: Build and publish Docker image

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    # Weekly rebuild so OS-level patches (apt upgrade in the Dockerfile)
    # keep landing even without an app code change.
    - cron: '0 6 * * 1'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase repo owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/notespice:latest
            ghcr.io/${{ env.OWNER_LC }}/notespice:${{ github.sha }}
